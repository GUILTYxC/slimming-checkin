version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: slimming-ds-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-slimming-ds-change-this-secret-in-production}
      - DB_PATH=/app/data/slimming.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
